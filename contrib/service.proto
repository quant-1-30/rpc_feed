syntax="proto3";

import "google/protobuf/empty.proto";

// optional bytes title [(max_length) = 512];

// number packed memory packed
// due to protobuf process repeated message too consuming so use columnar 

message DailyFrame {
    bytes sid = 1;
    repeated int32 date = 2 [packed = true];
    repeated int32 open = 3 [packed = true];
    repeated int32 high = 4 [packed = true];
    repeated int32 low = 5 [packed = true];
    repeated int32 close = 6 [packed = true];
    repeated int64 volume = 7 [packed = true];
    repeated int64 amount = 8 [packed = true];
}

message TickFrame {
    bytes sid = 1;
    repeated int32 tick = 2 [packed = true];
    repeated int32 open = 3 [packed = true];
    repeated int32 high = 4 [packed = true];
    repeated int32 low = 5 [packed = true];
    repeated int32 close = 6 [packed = true];
    repeated int64 volume = 7 [packed = true];
    repeated int64 amount = 8 [packed = true];
}

message CloseFrame {
    bytes sid = 1;
    repeated int32 date = 2 [packed = true];
    repeated int32 close = 3 [packed = true];
}

message AdjFrame {
    bytes sid = 1;
    repeated int32 ex_date = 2 [packed = true];
    repeated int32 register_date = 3 [packed = true];
    repeated int32 bonus_share = 4 [packed = true];
    repeated int32 transfer = 5 [packed = true];
    repeated int32 bonus = 6 [packed = true];
}

message RightmentFrame {
    bytes sid = 1;
    repeated int32 ex_date = 2 [packed = true];
    repeated int32 register_date = 3 [packed = true];
    repeated int32 price = 4 [packed = true];
    repeated int32 ratio = 5 [packed = true];
}

message InstFrame {
    repeated bytes sid = 1;
    repeated bytes name = 2;
    repeated int32 first_trading = 3 [packed = true];
    repeated int32 delist = 4 [packed = true];
}


message Calendar {
    bytes tz_info = 1;
    repeated int32 date = 2 [packed = true];
}


// huge data ---> Arrow 
message ArrowPayload {
    bytes sid = 1;
    string schema_type = 2; // "tick", "daily", etc.
    bytes ipc_blob = 3;     // Serialize Arrow RecordBatch
}

// request 

message QuoteRequest {
    int32 start_date = 1;
    int32 end_date = 2;
    repeated bytes sid = 3;
}

service btDataFeed {
    rpc CalendarCall(QuoteRequest) returns (stream Calendar);
    
    // Column Streaming
    rpc InstrumentCall (QuoteRequest) returns (stream InstFrame);
    rpc IndexStreamCall (QuoteRequest) returns (stream DailyFrame);
    rpc TickStreamCall (QuoteRequest) returns (stream TickFrame);
    rpc CloseStreamCall (QuoteRequest) returns (stream CloseFrame);
    rpc AdjustmentStreamCall (QuoteRequest) returns (stream AdjFrame);
    rpc RightStreamCall (QuoteRequest) returns (stream RightmentFrame);

    // ultra uninveral Arrow 
    // rpc UniversalArrowStream(QuoteRequest) returns (stream ArrowPayload);

    rpc HeartBeat(google.protobuf.Empty) returns (google.protobuf.Empty);
}
