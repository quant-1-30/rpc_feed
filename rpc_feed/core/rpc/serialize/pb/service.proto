syntax="proto3";

import "google/protobuf/empty.proto";

// optional bytes title [(max_length) = 512];

message QuoteRequest {
    int32 start_date = 1;
    int32 end_date = 2;
    repeated bytes sid = 3;
}

message ArrowFrame {
    bytes payload = 1;
}

service btDataFeed {
    rpc CalendarCall(QuoteRequest) returns (stream ArrowFrame);
    
    rpc InstrumentCall (QuoteRequest) returns (stream ArrowFrame);
    rpc IndexStreamCall (QuoteRequest) returns (stream ArrowFrame);
    rpc TickStreamCall (QuoteRequest) returns (stream ArrowFrame);
    rpc CloseStreamCall (QuoteRequest) returns (stream ArrowFrame);
    rpc AdjustmentStreamCall (QuoteRequest) returns (stream ArrowFrame);
    rpc RightStreamCall (QuoteRequest) returns (stream ArrowFrame);

    // ultra uninveral Arrow 
    // rpc UniversalArrowStream(QuoteRequest) returns (stream ArrowPayload);

    rpc HeartBeat(google.protobuf.Empty) returns (google.protobuf.Empty);
}
